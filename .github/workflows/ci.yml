name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== Frontend ====================
  frontend:
    name: Frontend (Build & Lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ==================== Payment Service ====================
  payment-service:
    name: Payment Service (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - run: mvn -B clean verify

  # ==================== Account Service ====================
  account-service:
    name: Account Service (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: account-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - run: mvn -B clean verify

  # ==================== Ledger Service ====================
  ledger-service:
    name: Ledger Service (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ledger-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - run: mvn -B clean verify

  # ==================== Risk Service ====================
  risk-service:
    name: Risk Service (Lint & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py

  # ==================== Gateway Service ====================
  gateway-service:
    name: Gateway Service (Build & Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - run: mvn -B clean verify

  # ==================== Notification Service ====================
  notification-service:
    name: Notification Service (Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go mod tidy
      - run: go build ./...
