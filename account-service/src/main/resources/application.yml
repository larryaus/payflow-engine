server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/payflow
    username: payflow
    password: payflow_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.payflow: INFO
