version: '3.8'

services:
  # ==================== Infrastructure ====================
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: payflow-kafka-cluster-001
    ports:
      - "9092:9092"

  # ==================== Services ====================
  payment-service:
    build: ./payment-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql://payflow:payflow_secret@postgres:5432/payflow
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      ACCOUNT_SERVICE_URL: http://account-service:8082
      LEDGER_SERVICE_URL: http://ledger-service:8083
      RISK_SERVICE_URL: http://risk-service:8084
    depends_on:
      - postgres
      - redis
      - kafka

  account-service:
    build: ./account-service
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgresql://payflow:payflow_secret@postgres:5432/payflow
    depends_on:
      - postgres

  ledger-service:
    build: ./ledger-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql://payflow:payflow_secret@postgres:5432/payflow
    depends_on:
      - postgres

  risk-service:
    build: ./risk-service
    ports:
      - "8084:8084"

  notification-service:
    build: ./notification-service
    ports:
      - "8085:8085"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - payment-service
      - account-service

volumes:
  pgdata:
